        <p>虚拟机规模集是一项免费服务，因此本身不提供具有财务保障的服务级别协议。但是，如果虚拟机规模集在 2 个或 2 个以上容错域中包含了虚拟机，则其可用性取决于基础虚拟机服务级别协议。请访问<a href="../virtual-machines/index.html">虚拟机服务级别协议</a>页。</p>
